<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plenus - Gestión Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #94a3b8;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      @keyframes pulse-orange {
        0%, 100% { background-color: #f97316; /* orange-500 */ }
        50% { background-color: #d1d5db; /* gray-300 */ }
      }
      .animate-pulse-orange {
        animation: pulse-orange 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-purple {
        0%, 100% { background-color: #9333ea; /* purple-600 */ }
        50% { background-color: #d1d5db; /* gray-300 */ }
      }
      .animate-pulse-purple {
        animation: pulse-purple 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-green {
        0%, 100% { background-color: #16a34a; /* green-600 */ }
        50% { background-color: #22c55e; /* green-500 */ }
      }
      .animate-pulse-green {
        animation: pulse-green 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-amber {
        0%, 100% { background-color: #f59e0b; /* amber-500 */ }
        50% { background-color: #fcd34d; /* amber-300 */ }
      }
      .animate-pulse-amber {
        animation: pulse-amber 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse-blue {
        0%, 100% { background-color: #3b82f6; /* blue-500 */ }
        50% { background-color: #93c5fd; /* blue-300 */ }
      }
      .animate-pulse-blue {
        animation: pulse-blue 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      /* Print styles */
      @media print {
        body * {
          visibility: hidden;
        }
        .print-section, .print-section * {
          visibility: visible;
        }
        .print-section {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
        }
        .no-print {
          display: none !important;
        }
      }
    </style>
